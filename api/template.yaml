AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  WhoIsMe API — conversational icebreaker + turns backend.
  HTTP API Gateway backed by Lambda + DynamoDB.

Parameters:
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for api.whoisme.io (must be in us-east-1)

  ApiDomainName:
    Type: String
    Default: "api.whoisme.io"
    Description: Custom domain for the API

  NotificationEmail:
    Type: String
    Default: "steven@dolltribe.com"
    Description: Verified SES email address for contact form notifications

  SlackmailUrl:
    Type: String
    Default: ""
    Description: Slackmail service base URL for admin notifications

  SlackmailApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Slackmail API key

  AdminEmails:
    Type: String
    Default: "steven@dolltribe.com"
    Description: Comma-separated list of authorised admin email addresses

  SiteUrl:
    Type: String
    Default: "https://whoisme.io"
    Description: Public site URL used to build magic link hrefs

  CfApiToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Cloudflare API token for KV writes on publish

  CfZoneId:
    Type: String
    Default: ""
    Description: Cloudflare Zone ID for whoisme.io

  CfKvNamespaceId:
    Type: String
    Default: ""
    Description: Cloudflare KV namespace ID for profile storage

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30
    Tracing: PassThrough
    Environment:
      Variables:
        ICEBREAKERS_TABLE: !Ref IcebreakersTable
        TURNS_TABLE: !Ref ConversationTurnsTable
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        CONTACTS_TABLE: !Ref ContactsTable
        IDEAS_TABLE: !Ref ConversationIdeasTable
        POWERTOOLS_SERVICE_NAME: whoisme-api
        LOG_LEVEL: INFO
        NOTIFICATION_EMAIL: !Ref NotificationEmail
        SLACKMAIL_URL: !Ref SlackmailUrl
        SLACKMAIL_API_KEY: !Ref SlackmailApiKey
        ADMIN_EMAILS: !Ref AdminEmails
        SITE_URL: !Ref SiteUrl
        ADMIN_TOKENS_TABLE: !Ref AdminTokensTable
        USERS_TABLE: !Ref UsersTable
        USER_TOKENS_TABLE: !Ref UserTokensTable
        INTERVIEW_SESSIONS_TABLE: !Ref InterviewSessionsTable
        CF_API_TOKEN: !Ref CfApiToken
        CF_ZONE_ID: !Ref CfZoneId
        CF_KV_NAMESPACE_ID: !Ref CfKvNamespaceId

Resources:
  # ── DynamoDB Tables ─────────────────────────────────────────────────────────

  IcebreakersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-icebreakers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: icebreaker_id
          AttributeType: S
        - AttributeName: is_active
          AttributeType: S
      KeySchema:
        - AttributeName: icebreaker_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: is_active-index
          KeySchema:
            - AttributeName: is_active
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ConversationTurnsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-turns
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
        - AttributeName: order
          AttributeType: N
      KeySchema:
        - AttributeName: conversation_id
          KeyType: HASH
        - AttributeName: order
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
      KeySchema:
        - AttributeName: conversation_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ContactsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-contacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: contact_id
          AttributeType: S
      KeySchema:
        - AttributeName: contact_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  ConversationIdeasTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-conversation-ideas
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idea_id
          AttributeType: S
      KeySchema:
        - AttributeName: idea_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  AdminTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: whoisme-admin-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_id
          AttributeType: S
      KeySchema:
        - AttributeName: token_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: username-index
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  UserTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: whoisme-user-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_id
          AttributeType: S
      KeySchema:
        - AttributeName: token_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  InterviewSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: whoisme-interview-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # ── Lambda Function ──────────────────────────────────────────────────────────

  WhoIsMeApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: whoisme-api
      CodeUri: src/
      Handler: api/app.handler
      ReservedConcurrentExecutions: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IcebreakersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationTurnsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContactsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationIdeasTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AdminTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InterviewSessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action:
                - ses:SendEmail
                - sesv2:SendEmail
              Resource: "*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref WhoIsMeHttpApi

  # ── HTTP API ─────────────────────────────────────────────────────────────────

  WhoIsMeHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3000

  # ── Custom Domain ────────────────────────────────────────────────────────────

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCertificate
    Properties:
      DomainName: !Ref ApiDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL

  ApiDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCertificate
    DependsOn: ApiCustomDomain
    Properties:
      ApiId: !Ref WhoIsMeHttpApi
      DomainName: !Ref ApiDomainName
      Stage: !Ref WhoIsMeHttpApiApiGatewayDefaultStage

  # ── EventBridge Warmup ───────────────────────────────────────────────────────

  WarmupRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt WhoIsMeApiFunction.Arn
          Id: Warmup
          Input: '{"source": "warmup"}'

  WarmupPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WhoIsMeApiFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${WarmupRule}"

Conditions:
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${WhoIsMeHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Description: HTTP API endpoint URL

  ApiCustomDomainTarget:
    Condition: HasCertificate
    Value: !GetAtt ApiCustomDomain.RegionalDomainName
    Description: CNAME target for Cloudflare DNS (gray cloud / proxy OFF)
