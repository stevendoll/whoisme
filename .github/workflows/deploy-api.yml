name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  STACK_NAME: whoisme-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run tests
        run: pipenv run python -m pytest tests/ -v

  deploy:
    name: SAM deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel

      - name: Handle ROLLBACK_COMPLETE stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME
          fi

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
              "ApiDomainName=api.whoisme.io" \
              "SlackmailUrl=${{ secrets.SLACKMAIL_URL }}" \
              "SlackmailApiKey=${{ secrets.SLACKMAIL_API_KEY }}"

      - name: Update api.whoisme.io DNS
        run: |
          APIGW_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiCustomDomainTarget`].OutputValue' \
            --output text)

          if [ -z "$APIGW_DOMAIN" ] || [ "$APIGW_DOMAIN" = "None" ]; then
            echo "No custom domain target in stack outputs — skipping DNS update"
            exit 0
          fi
          echo "API Gateway domain: $APIGW_DOMAIN"

          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records?name=api.whoisme.io&type=CNAME" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | \
            python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")

          PAYLOAD="{\"type\":\"CNAME\",\"name\":\"api.whoisme.io\",\"content\":\"$APIGW_DOMAIN\",\"ttl\":1,\"proxied\":false}"

          if [ -n "$RECORD_ID" ]; then
            curl -sf -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Updated' if r['success'] else r['errors'])"
          else
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Created' if r['success'] else r['errors'])"
          fi

      - name: Wait for API Gateway propagation
        run: sleep 30

      - name: Set up Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install

      - name: Run smoke tests
        run: pipenv run python ../scripts/smoke_test.py
        env:
          SMOKE_BASE_URL: https://api.whoisme.io
