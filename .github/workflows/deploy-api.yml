name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  STACK_NAME: whoisme-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run tests
        run: pipenv run python -m pytest tests/ -v

  deploy:
    name: SAM deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel

      - name: Handle ROLLBACK_COMPLETE stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME
          fi

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AcmCertificateArn='${{ secrets.ACM_CERTIFICATE_ARN }}'" \
              "ApiDomainName='api.whoisme.io'" \
              "SlackmailUrl='${{ secrets.SLACKMAIL_URL }}'" \
              "SlackmailApiKey='${{ secrets.SLACKMAIL_API_KEY }}'" \
              "CfApiToken='${{ secrets.CLOUDFLARE_API_TOKEN }}'" \
              "CfZoneId='${{ secrets.CLOUDFLARE_ZONE_ID }}'" \
              "CfKvNamespaceId='${{ secrets.CF_KV_NAMESPACE_ID }}'"

      - name: Update api.whoisme.io DNS
        run: |
          APIGW_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiCustomDomainTarget`].OutputValue' \
            --output text)

          if [ -z "$APIGW_DOMAIN" ] || [ "$APIGW_DOMAIN" = "None" ]; then
            echo "No custom domain target in stack outputs — skipping DNS update"
            exit 0
          fi

          CF_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }} \
          CF_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
          ../scripts/cf-dns-upsert.sh api.whoisme.io "$APIGW_DOMAIN"

      - name: Smoke tests (with retry)
        run: |
          for i in 1 2 3 4 5; do
            sleep 15
            pipenv run python ../scripts/smoke_test.py && exit 0
            echo "Attempt $i failed, retrying..."
          done
          exit 1
        env:
          SMOKE_BASE_URL: https://api.whoisme.io
