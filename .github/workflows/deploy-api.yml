name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  STACK_NAME: t12n-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run tests
        run: pipenv run python -m pytest tests/ -v

  deploy:
    name: SAM deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::600775874112:role/t12n-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel

      - name: Handle ROLLBACK_COMPLETE stack
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed stack..."
            aws cloudformation delete-stack --stack-name $STACK_NAME
            aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME
          fi

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
              "ApiDomainName=api.t12n.ai" \
              "SlackmailUrl=${{ secrets.SLACKMAIL_URL }}" \
              "SlackmailApiKey=${{ secrets.SLACKMAIL_API_KEY }}"

      - name: Wait for API Gateway propagation
        run: sleep 30

      - name: Set up Python for smoke tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install

      - name: Run smoke tests
        run: pipenv run python ../scripts/smoke_test.py
        env:
          SMOKE_BASE_URL: https://api.t12n.ai
