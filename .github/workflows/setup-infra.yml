name: Setup Infrastructure (run once)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CERT_ARN: arn:aws:acm:us-east-1:600775874112:certificate/b473cd37-34b0-45e2-8fdc-d07e91bff320
  S3_BUCKET: whoisme-ui-prod
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Provision infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ACM cert validation ────────────────────────────────────────────────────

      - name: Add ACM cert validation CNAME to Cloudflare
        run: |
          PAYLOAD='{
            "type": "CNAME",
            "name": "_b28ed18e57bd42666bae8cca859c2f77.whoisme.io",
            "content": "_96fbb9b147f0098cec61e1dcacaa34e7.jkddzztszm.acm-validations.aws.",
            "ttl": 1,
            "proxied": false
          }'

          # Check if record already exists
          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records?name=_b28ed18e57bd42666bae8cca859c2f77.whoisme.io&type=CNAME" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | \
            python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")

          if [ -n "$RECORD_ID" ]; then
            echo "Validation record already exists, skipping"
          else
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Created validation record' if r['success'] else r['errors'])"
          fi

      - name: Wait for ACM cert validation
        run: |
          echo "Waiting for certificate validation (up to 5 minutes)..."
          aws acm wait certificate-validated \
            --certificate-arn $CERT_ARN \
            --region $AWS_REGION
          echo "Certificate validated."

      # ── CloudFront distribution ────────────────────────────────────────────────

      - name: Create CloudFront OAC
        id: oac
        run: |
          # Check if OAC already exists
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='whoisme-oac'].Id" \
            --output text)

          if [ -z "$OAC_ID" ] || [ "$OAC_ID" = "None" ]; then
            OAC_ID=$(aws cloudfront create-origin-access-control \
              --origin-access-control-config '{
                "Name": "whoisme-oac",
                "Description": "OAC for whoisme-ui-prod",
                "SigningProtocol": "sigv4",
                "SigningBehavior": "always",
                "OriginAccessControlOriginType": "s3"
              }' \
              --query 'OriginAccessControl.Id' --output text)
            echo "Created OAC: $OAC_ID"
          else
            echo "OAC already exists: $OAC_ID"
          fi
          echo "id=$OAC_ID" >> $GITHUB_OUTPUT

      - name: Create CloudFront distribution
        id: cf
        run: |
          # Check if distribution already exists for whoisme.io
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='whoisme.io']].Id" \
            --output text)

          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            echo "Distribution already exists: $DIST_ID"
            echo "id=$DIST_ID" >> $GITHUB_OUTPUT
          else
            DIST=$(aws cloudfront create-distribution --distribution-config '{
              "CallerReference": "whoisme-'$(date +%s)'",
              "Aliases": { "Quantity": 1, "Items": ["whoisme.io"] },
              "DefaultRootObject": "index.html",
              "Origins": {
                "Quantity": 1,
                "Items": [{
                  "Id": "whoisme-ui-prod",
                  "DomainName": "whoisme-ui-prod.s3.us-east-1.amazonaws.com",
                  "S3OriginConfig": { "OriginAccessIdentity": "" },
                  "OriginAccessControlId": "${{ steps.oac.outputs.id }}"
                }]
              },
              "DefaultCacheBehavior": {
                "TargetOriginId": "whoisme-ui-prod",
                "ViewerProtocolPolicy": "redirect-to-https",
                "CachePolicyId": "658327ea-f89d-4fab-a63d-7e88639e58f6",
                "Compress": true,
                "AllowedMethods": { "Quantity": 2, "Items": ["GET", "HEAD"] }
              },
              "CustomErrorResponses": {
                "Quantity": 1,
                "Items": [{
                  "ErrorCode": 404,
                  "ResponsePagePath": "/index.html",
                  "ResponseCode": "200",
                  "ErrorCachingMinTTL": 0
                }]
              },
              "Comment": "whoisme.io UI",
              "Enabled": true,
              "HttpVersion": "http2and3",
              "ViewerCertificate": {
                "ACMCertificateArn": "'"$CERT_ARN"'",
                "SSLSupportMethod": "sni-only",
                "MinimumProtocolVersion": "TLSv1.2_2021"
              }
            }')

            DIST_ID=$(echo "$DIST" | python3 -c "import sys,json; print(json.load(sys.stdin)['Distribution']['Id'])")
            DIST_DOMAIN=$(echo "$DIST" | python3 -c "import sys,json; print(json.load(sys.stdin)['Distribution']['DomainName'])")
            echo "Created distribution: $DIST_ID ($DIST_DOMAIN)"
            echo "id=$DIST_ID" >> $GITHUB_OUTPUT
            echo "domain=$DIST_DOMAIN" >> $GITHUB_OUTPUT
          fi

      - name: Update S3 bucket policy for CloudFront OAC
        run: |
          DIST_ID="${{ steps.cf.outputs.id }}"
          aws s3api put-bucket-policy \
            --bucket $S3_BUCKET \
            --policy "{
              \"Version\": \"2012-10-17\",
              \"Statement\": [{
                \"Sid\": \"AllowCloudFront\",
                \"Effect\": \"Allow\",
                \"Principal\": { \"Service\": \"cloudfront.amazonaws.com\" },
                \"Action\": \"s3:GetObject\",
                \"Resource\": \"arn:aws:s3:::$S3_BUCKET/*\",
                \"Condition\": {
                  \"StringEquals\": {
                    \"AWS:SourceArn\": \"arn:aws:cloudfront::600775874112:distribution/$DIST_ID\"
                  }
                }
              }]
            }"
          echo "S3 bucket policy updated for distribution $DIST_ID"

      - name: Add whoisme.io CNAME to Cloudflare
        run: |
          CF_DOMAIN="${{ steps.cf.outputs.domain }}"
          if [ -z "$CF_DOMAIN" ]; then
            echo "Distribution domain not available (may already exist) — get it from AWS console and add CNAME manually"
            exit 0
          fi

          RECORD_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records?name=whoisme.io&type=CNAME" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | \
            python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')")

          PAYLOAD="{\"type\":\"CNAME\",\"name\":\"whoisme.io\",\"content\":\"$CF_DOMAIN\",\"ttl\":1,\"proxied\":false}"

          if [ -n "$RECORD_ID" ]; then
            curl -sf -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Updated whoisme.io CNAME' if r['success'] else r['errors'])"
          else
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; r=json.load(sys.stdin); print('Created whoisme.io CNAME' if r['success'] else r['errors'])"
          fi

      - name: Summary
        run: |
          echo "=== Infrastructure Setup Complete ==="
          echo "CloudFront Distribution ID: ${{ steps.cf.outputs.id }}"
          echo ""
          echo "Next steps:"
          echo "1. Add CLOUDFRONT_DISTRIBUTION_ID=${{ steps.cf.outputs.id }} as a GitHub secret"
          echo "2. Run the Deploy UI workflow to push the first build"
          echo "3. Run the Deploy API workflow to deploy the Lambda stack"
