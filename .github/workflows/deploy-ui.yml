name: Deploy UI

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CARTESIA_API_KEY: ${{ secrets.VITE_CARTESIA_API_KEY }}
          VITE_CARTESIA_VOICE_ID: ${{ secrets.VITE_CARTESIA_VOICE_ID }}
          VITE_CARTESIA_VOICES: ${{ secrets.VITE_CARTESIA_VOICES }}
        run: npm run build

      - name: Sync to S3
        run: |
          # Hashed assets: cache aggressively (content-addressed, safe to cache forever)
          aws s3 sync ui/dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "max-age=31536000,immutable" \
            --region ${{ env.AWS_REGION }}
          # index.html and other root files: never cache (always revalidate)
          aws s3 sync ui/dist/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --delete --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Smoke test
        run: curl -sf https://whoisme.io > /dev/null && echo "UI smoke test passed"

      - name: Notify Slack on failure
        if: failure()
        uses: ./.github/actions/notify-slack
        with:
          slackmail_url: ${{ secrets.SLACKMAIL_URL }}
          slackmail_api_key: ${{ secrets.SLACKMAIL_API_KEY }}
